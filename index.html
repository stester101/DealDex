<style>
:root{
  --night:#0c1c17; --shell:#123329; --shellHi:#1c4638; --bezel:#081511;
  --lcd:#bcd6a6; --lcdMid:#9fbf88; --ink:#20351f; --inkDim:#4b6b45;
  --send:#37b57e; --amber:#e0a53c; --stamp:#c0473c; --cream:#efe9d8; --gold:#d4a13a;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{min-height:100vh;background:radial-gradient(120% 120% at 50% -10%, var(--shellHi), var(--night));
  display:flex;justify-content:center;align-items:flex-start;padding:6px 4px;
  font-family:'VT323',ui-monospace,monospace;color:var(--ink);}
button{font-family:'VT323',monospace;cursor:pointer;}
button:disabled{cursor:not-allowed;filter:grayscale(.4) brightness(.9);}
.silk{font-family:'Silkscreen',monospace;}
/* ---- device shell ---- */
.shell{width:100%;max-width:520px;background:var(--shell);border-radius:28px;padding:14px;
  box-shadow:0 30px 60px rgba(0,0,0,.55), inset 0 2px 0 rgba(255,255,255,.06);border:2px solid var(--bezel);}
.lcd{position:relative;background:linear-gradient(160deg,var(--lcd),var(--lcdMid));border-radius:14px;
  border:3px solid var(--bezel);overflow:hidden;min-height:440px;box-shadow:inset 0 0 26px rgba(20,40,20,.35);display:flex;flex-direction:column;}
.lcd::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(10,30,15,.06) 0, rgba(10,30,15,.06) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:multiply;}
.led{width:9px;height:9px;border-radius:50%;background:var(--send);box-shadow:0 0 8px var(--send);animation:blink 2.4s infinite;}
@keyframes blink{0%,92%,100%{opacity:1}95%{opacity:.25}}
.press{transition:transform .05s, filter .1s;}
.press:active{transform:translateY(1px) scale(.98);}
.press:hover{filter:brightness(1.06);}
/* ---- generic UI ---- */
.pad{padding:12px;}
.panel{background:rgba(255,255,255,.28);border:2px solid var(--ink);border-radius:10px;padding:8px 10px;}
.panelD{background:rgba(20,40,25,.16);border:2px solid var(--ink);border-radius:10px;padding:8px 10px;}
.pill{color:#fff;border-radius:4px;padding:0 6px;font-size:13px;white-space:nowrap;display:inline-block;}
.btn{background:var(--send);color:#08130f;border:2px solid var(--ink);border-radius:9px;padding:9px 14px;
  font-family:'Silkscreen',monospace;font-size:11px;letter-spacing:1px;width:100%;}
.bsm{border:2px solid var(--ink);border-radius:8px;padding:7px 9px;font-size:17px;line-height:1.05;color:#08130f;}
.overlay{position:absolute;left:8px;right:8px;bottom:8px;top:8px;background:var(--lcd);border:3px solid var(--ink);
  border-radius:10px;padding:12px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:30;display:flex;flex-direction:column;overflow:hidden;}
.overlay>*{flex:none;}
.overlay .scroll{flex:1 1 auto;overflow-y:auto;min-height:0;}
.card{border-radius:14px;padding:10px;color:#20321f;position:relative;overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.35), inset 0 0 0 3px rgba(255,255,255,.35);}
.card::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(115deg,rgba(255,255,255,.10) 0 8px,transparent 8px 20px);pointer-events:none;}
.card .cardframe{background:rgba(255,255,255,.82);border-radius:10px;padding:9px;position:relative;z-index:1;border:2px solid rgba(0,0,0,.25);}
.card .art{border-radius:8px;height:120px;display:flex;align-items:center;justify-content:center;border:2px solid rgba(0,0,0,.3);position:relative;overflow:hidden;}
.statb{height:9px;border-radius:5px;background:rgba(0,0,0,.14);overflow:hidden;}
.statb>i{display:block;height:100%;border-radius:5px;}
.holo{position:absolute;inset:0;background:linear-gradient(125deg,transparent 30%,rgba(255,255,255,.5) 48%,transparent 62%);
  background-size:250% 250%;animation:holoShine 3.5s linear infinite;pointer-events:none;mix-blend-mode:screen;}
@keyframes holoShine{0%{background-position:120% 0}100%{background-position:-40% 0}}
.fullov{position:absolute;inset:8px;background:var(--lcd);border:3px solid var(--ink);border-radius:10px;
  padding:12px;z-index:30;overflow-y:auto;}
.toast{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--lcd);
  padding:6px 12px;border-radius:8px;font-size:16px;max-width:90%;text-align:center;z-index:60;animation:tin .25s ease-out;}
@keyframes tin{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.stampbox{position:absolute;top:26px;right:18px;transform:rotate(-14deg);border:3px solid var(--stamp);color:var(--stamp);
  font-family:'Silkscreen',monospace;font-size:12px;padding:3px 8px;border-radius:4px;opacity:.75;letter-spacing:2px;}
/* ---- overworld ---- */
.vp{position:relative;overflow:hidden;border:2px solid var(--ink);border-radius:8px;background:#2f5a3f;margin:0 auto;}
.lcd>.pad,.lcd>.screen{flex:1;display:flex;flex-direction:column;}
.world{position:absolute;transition:transform .13s linear;will-change:transform;}
.tile{position:absolute;display:flex;align-items:center;justify-content:center;}
.spr{position:absolute;display:flex;align-items:center;justify-content:center;z-index:5;transition:transform .13s linear, left .13s linear, top .13s linear;}
.bob{animation:bob .55s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
.flo{animation:flo 3s ease-in-out infinite;}
@keyframes flo{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.wat{animation:wat 2.6s ease-in-out infinite;}
@keyframes wat{0%,100%{filter:brightness(1)}50%{filter:brightness(1.16)}}
.tint{position:absolute;inset:0;pointer-events:none;z-index:8;transition:background 1s;}
.rain{position:absolute;inset:0;pointer-events:none;z-index:9;opacity:.35;
  background:repeating-linear-gradient(75deg, transparent 0 7px, rgba(180,210,255,.5) 7px 8px);
  animation:rainm .5s linear infinite;}
@keyframes rainm{from{background-position:0 0}to{background-position:-40px 40px}}
/* ---- battle fx ---- */
.shake{animation:shake .35s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .3s;}
.shakeBig{animation:shakeB .4s;}
@keyframes shakeB{0%,100%{transform:translate(0,0)}15%{transform:translate(-9px,3px)}30%{transform:translate(9px,-3px)}45%{transform:translate(-7px,2px)}60%{transform:translate(7px,-2px)}75%{transform:translate(-4px,1px)}}
.hitflash{animation:hitf .3s;}
@keyframes hitf{0%,100%{filter:none}50%{filter:brightness(3) saturate(0)}}
.faintanim{animation:faint .6s forwards;}
@keyframes faint{to{transform:translateY(26px);opacity:0}}
.growanim{animation:grow .8s;}
@keyframes grow{0%{transform:scale(.4);filter:brightness(4)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
.spark{position:absolute;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:40;animation:spk .55s forwards;}
@keyframes spk{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.2)}}
.swirl{position:absolute;inset:0;z-index:55;pointer-events:none;
  background:conic-gradient(var(--ink) 0 25%, transparent 25% 50%, var(--ink) 50% 75%, transparent 75%);
  animation:swl .7s ease-in forwards;}
@keyframes swl{from{transform:rotate(0) scale(0);opacity:.95}to{transform:rotate(720deg) scale(3);opacity:0}}
.hpshine{position:relative;overflow:hidden;}
.hpshine::after{content:"";position:absolute;top:0;left:-40%;width:30%;height:100%;background:rgba(255,255,255,.35);
  transform:skewX(-20deg);animation:shine 2.4s infinite;}
@keyframes shine{from{left:-40%}to{left:120%}}
.catchwob{animation:wob 1s ease-in-out;}
@keyframes wob{0%,100%{transform:rotate(0)}20%{transform:rotate(-18deg)}40%{transform:rotate(14deg)}60%{transform:rotate(-9deg)}80%{transform:rotate(5deg)}}
.lvlflash{animation:lvf .7s;}
@keyframes lvf{0%,100%{box-shadow:none}50%{box-shadow:0 0 22px 6px rgba(212,161,58,.8)}}
.dpadb{background:var(--bezel);color:var(--cream);border:none;border-radius:7px;font-size:19px;width:44px;height:40px;}
.abb{width:44px;height:44px;border-radius:50%;background:var(--stamp);color:#fff;border:2px solid rgba(0,0,0,.3);
  font-family:'Silkscreen',monospace;font-size:13px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.3);}
.menurow{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.3);
  border:2px solid var(--ink);border-radius:8px;padding:6px 9px;margin-bottom:5px;font-size:17px;}
.tabb{flex:1;border:2px solid var(--ink);border-radius:7px;padding:4px 2px;font-size:14px;background:rgba(255,255,255,.25);color:var(--ink);}
.tabb.on{background:var(--ink);color:var(--lcd);}
::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--inkDim);border-radius:4px}
@media (prefers-reduced-motion: reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important;}}
@media (max-width:430px){.lcd{min-height:420px}}
</style>
</head>

<script type="text/plain" id="gamesrc">
const {useState,useEffect,useRef,useMemo,useCallback} = React;

/* ================= CORE HELPERS ================= */
const R=Math.random, ri=(a,b)=>a+Math.floor(R()*(b-a+1)), pick=a=>a[Math.floor(R()*a.length)],
  clamp=(v,l,h)=>Math.max(l,Math.min(h,v)), deep=o=>JSON.parse(JSON.stringify(o));
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);

/* ---- tiny synth ---- */
let AC=null, SND=true;
function tone(f,d=0.08,type="square",v=0.05,when=0){ try{
  if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)();
  if(!SND) return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=type;o.frequency.value=f;g.gain.value=v;
  o.connect(g);g.connect(AC.destination);
  const t=AC.currentTime+when;o.start(t);
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
  o.stop(t+d+0.02);}catch(e){} }
const sfx={
  blip:()=>tone(660,.05), sel:()=>tone(880,.06), back:()=>tone(330,.06),
  hit:()=>{tone(180,.09,"sawtooth",.06)}, crit:()=>{tone(140,.14,"sawtooth",.08);tone(90,.14,"sawtooth",.06,.05)},
  heal:()=>{[520,660,780].forEach((f,i)=>tone(f,.09,"triangle",.05,i*.07))},
  faint:()=>{[400,300,200,120].forEach((f,i)=>tone(f,.1,"square",.05,i*.08))},
  catch1:()=>tone(500,.06,"square",.06), caught:()=>{[523,659,784,1046].forEach((f,i)=>tone(f,.12,"triangle",.06,i*.1))},
  lvl:()=>{[659,784,988,1318].forEach((f,i)=>tone(f,.1,"triangle",.06,i*.08))},
  bstart:()=>{[220,330,440,550,660].forEach((f,i)=>tone(f,.07,"square",.05,i*.05))},
  coin:()=>{tone(988,.05,"triangle",.06);tone(1319,.09,"triangle",.06,.05)},
  chip:()=>{[392,523,659,784,1046].forEach((f,i)=>tone(f,.13,"triangle",.07,i*.1))},
};

/* ================= TYPES ================= */
const TYPES=["Dust","Indica","Sativa","Hybrid","Kush","Haze","Diesel","Exotic"];
const TCOL={Dust:"#9a8f77",Indica:"#6f7bd6",Sativa:"#e0733c",Hybrid:"#3fae7a",Kush:"#8a6bd0",Haze:"#5aa7c9",Diesel:"#c9963a",Exotic:"#d4a13a"};

const CHART={};
TYPES.forEach(a=>{CHART[a]={};TYPES.forEach(d=>CHART[a][d]=1);});
[["Sativa","Hybrid"],["Hybrid","Indica"],["Indica","Sativa"],
 ["Kush","Diesel"],["Diesel","Haze"],["Haze","Kush"]].forEach(([a,b])=>{CHART[a][b]=2;CHART[b][a]=.5;});
TYPES.forEach(a=>{ if(a!=="Exotic") CHART[a]["Exotic"]=.75; });
CHART["Dust"]["Exotic"]=.5;
TYPES.forEach(d=>{ if(d!=="Exotic") CHART["Exotic"][d]=1.25; });
/* cross-links for depth */
CHART["Haze"]["Indica"]=1.5; CHART["Indica"]["Haze"]=.75;
CHART["Diesel"]["Sativa"]=1.5; CHART["Sativa"]["Diesel"]=.75;
CHART["Kush"]["Hybrid"]=1.5; CHART["Hybrid"]["Kush"]=.75;
function typeMult(mvType,defTypes){ return defTypes.reduce((m,t)=>m*CHART[mvType][t],1); }

/* ---- status conditions ---- */
const STATUS={
  CLK:{name:"Couch-locked",col:"#b78a3c",desc:"May not move; speed halved."},
  GRN:{name:"Greening out",col:"#7a4fb0",desc:"Loses HP each turn."},
  DAZ:{name:"Dazed",col:"#6f7bd6",desc:"Fast asleep for a bit."},
  MUN:{name:"Munchies",col:"#c0473c",desc:"Attack halved; snacks on own HP."},
};
const STAGE_M=s=>s>=0?(2+s)/2:2/(2-s);
const STATUS_CURE={CLK:"Deep Heat",GRN:"Bottled Water",DAZ:"Strong Coffee",MUN:"Snack Box"};
/* NOTE(design, 2026-07-08): statuses currently persist indefinitely until cured by item or full-heal (matches mainline Pokemon). User flagged that couch-locked staying on after the battle ended felt surprising. Left as-is per request; revisit if it should instead wear off after N turns or on leaving battle. */
/* ================= MOVES =================
   cat: P physical, S special, T status
   fx: st{id,ch} status | buff{stat:+n} self | deb{stat:-n,ch} target | heal f | drain f |
       recoil f | hits[a,b] | flinch n | crit n | weather id | prot | leech | cureSelf |

function M(id,name,type,cat,pow,acc,pp,pri,fx,desc){MOVES[id]={id,name,type,cat,pow,acc,pp,pri:pri||0,fx:fx||{},desc:desc||""};}

const ALLMOVES=Object.keys(MOVES);
/* pools by type+cat for learnset generation */
const POOL={};
TYPES.forEach(t=>{POOL[t]={P:[],S:[],T:[]};});
ALLMOVES.forEach(id=>{const m=MOVES[id];if(!m.fx.ohkoLike)POOL[m.type][m.cat].push(id);}); /* OHKO-style moves must only come from sig() level-gating, never the generic auto-learnset pool */

/* ================= STRAINS =================
   S(id,name,types,[hp,at,df,sa,sd,sp],catchRate,tier,evo{to,lvl},flavor)
   tier: 0 common 1 uncommon 2 rare 3 epic 4 legendary */
const DEX={}; let DEXN=0;
function S(id,name,types,bs,cr,tier,evo,flavor){
  DEX[id]={id,n:++DEXN,name,types,bs,cr,tier,evo:evo||null,flavor,baseXp:40+tier*35+Math.floor(bs.reduce((a,b)=>a+b)/6)};
}

const LEARN={};
Object.keys(DEX).forEach(id=>{
  const d=DEX[id], phys=d.bs[1]>=d.bs[3], t1=d.types[0], t2=d.types[1]||d.types[0];
  const pk=POOL[t1][phys?"P":"S"], sk=POOL[t2][phys?"S":"P"], tt=POOL[t1].T;
  const L=[[1,pk[0]],[1,POOL[t1].T[0]||tt[0]]];
  const lvls=[5,9,13,17,21,25,29,34,39,44,49];
  const seq=[pk[1],POOL["Dust"].P[0]==="dust_p0"?t1.toLowerCase()+"_pr":pk[0], t1.toLowerCase()+"_bf", sk[1]||sk[0],
    t1.toLowerCase()+"_dr", t1.toLowerCase()+"_db", pk[2], t1.toLowerCase()+"_mh", sk[2]||sk[1], t1.toLowerCase()+"_st", pk[pk.length-1]];
  lvls.forEach((lv,i)=>{ if(seq[i]&&MOVES[seq[i]]) L.push([lv,seq[i]]); });
  (SIGS[id]||[]).forEach(([lv,mv])=>{ if(MOVES[mv]) L.push([lv,mv]); });
  L.sort((a,b)=>a[0]-b[0]);
  const seen=new Set(); LEARN[id]=L.filter(([lv,mv])=>!seen.has(mv)&&seen.add(mv));
});

/* phases */
const PHASES=["Morning","Day","Evening","Night"];
const PHASE_TINT=["rgba(255,220,150,.10)","rgba(0,0,0,0)","rgba(230,120,60,.14)","rgba(10,20,60,.34)"];

/* ================= ENGINE ================= */
function statCalc(base,lvl,isHp){ return isHp? Math.floor(base*2*lvl/100)+lvl+10 : Math.floor(base*2*lvl/100)+5; }
function movesAt(sp,lvl){ return LEARN[sp].filter(([l])=>l<=lvl).map(([,m])=>m); }
function mkMon(sp,lvl){
  const d=DEX[sp], st={hp:statCalc(d.bs[0],lvl,1),atk:statCalc(d.bs[1],lvl),def:statCalc(d.bs[2],lvl),
    sa:statCalc(d.bs[3],lvl),sd:statCalc(d.bs[4],lvl),spe:statCalc(d.bs[5],lvl)};
  const ms=movesAt(sp,lvl).slice(-4).map(id=>({id,pp:MOVES[id].pp}));
  return {uid:Math.floor(R()*1e9),sp,lvl,xp:xpFor(lvl),hp:st.hp,stats:st,moves:ms,status:null,item:null};
}
function xpFor(l){ return l*l*l; }
function recalcStats(m){ const d=DEX[m.sp], pct=m.hp/m.stats.hp;
  m.stats={hp:statCalc(d.bs[0],m.lvl,1),atk:statCalc(d.bs[1],m.lvl),def:statCalc(d.bs[2],m.lvl),
    sa:statCalc(d.bs[3],m.lvl),sd:statCalc(d.bs[4],m.lvl),spe:statCalc(d.bs[5],m.lvl)};
  m.hp=Math.max(1,Math.round(m.stats.hp*pct)); }
function xpGain(foe,isTrainer){ return Math.max(1,Math.floor(DEX[foe.sp].baseXp*foe.lvl/7*(isTrainer?1.5:1))); }

/* battle-side stat stages & helpers */
function freshSide(m){ return {mon:m,stg:{atk:0,def:0,sa:0,sd:0,spe:0,acc:0,eva:0},vol:{},pinchUsed:false}; }
function effStat(side,key){
  let v=side.mon.stats[key]*STAGE_M(side.stg[key]);
  if(key==="spe"&&side.mon.status==="CLK") v*=.5;
  if(key==="atk"&&side.mon.status==="MUN") v*=.5;
  const it=side.mon.item&&ITEMS[side.mon.item]&&ITEMS[side.mon.item].held;
  if(it){ if((key==="def"||key==="sd")&&it.defb) v*=it.defb; if(key==="spe"&&it.spdb) v*=it.spdb; }
  return v;
}
function heldOf(m){ return m.item&&ITEMS[m.item]&&ITEMS[m.item].held||null; }

/* damage */
function calcDamage(atkSide,defSide,mv,weather){
  const a=atkSide.mon, d=defSide.mon, phys=mv.cat==="P";
  const atk=effStat(atkSide,phys?"atk":"sa"), def=effStat(defSide,phys?"def":"sd");
  let pow=mv.pow;
  if(mv.fx.ohkoLike) return {dmg:Math.max(1,d.hp-1),mult:1,crit:false,eff:"ohko"};
  const held=heldOf(a);
  if(held){ if(phys&&held.phys)pow*=held.phys; if(!phys&&held.spec)pow*=held.spec; }
  if(weather==="heat"&&mv.type==="Sativa")pow*=1.25;
  if(weather==="heat"&&mv.type==="Haze")pow*=.8;
  if(weather==="rain"&&mv.type==="Haze")pow*=1.25;
  if(weather==="rain"&&mv.type==="Diesel")pow*=.85;
  if(weather==="mist"&&mv.cat==="S")pow*=.9;
  const stab=DEX[a.sp].types.includes(mv.type)?1.5:1;
  const mult=typeMult(mv.type,DEX[d.sp].types);
  let critStage=(mv.fx.crit||0)+((held&&held.crit)?1:0);
  const crit=R()<(critStage>=1?0.125*critStage+0.0625:0.0625);
  let dmg=(((2*a.lvl/5+2)*pow*(atk/Math.max(1,def)))/50+2)*stab*mult*(crit?1.5:1)*(0.85+R()*0.15);
  return {dmg:Math.max(1,Math.round(dmg)),mult,crit};
}
function accCheck(atkSide,defSide,mv){
  if(mv.fx.ohkoLike){ // real OHKO-move rules: auto-fail vs a higher-level foe, accuracy shifts with level gap
    if(defSide.mon.lvl>atkSide.mon.lvl) return false;
    const acc=clamp(mv.acc+(atkSide.mon.lvl-defSide.mon.lvl),0,100);
    return R()*100<acc;
  }
  if(mv.acc>=100&&atkSide.stg.acc>=0&&defSide.stg.eva<=0) return true;
  let acc=mv.acc*STAGE_M(atkSide.stg.acc)/STAGE_M(defSide.stg.eva);
  const held=heldOf(atkSide.mon); if(held&&held.acc)acc*=held.acc;
  return R()*100<acc;
}
/* AI: should this trainer's foe switch out for a better matchup? Only ai level 2-3 ever consider it. */
function aiPickSwitch(b,mySide){
  if(!b.trainer||!b.foeTeam||(b.ai||(b.trainer&&b.trainer.ai)||1)<2) return null;
  const cur=b.foeTeam[b.foeTi]; if(cur.mon.hp<=0) return null;
  const myTypes=DEX[mySide.mon.sp].types;
  const threat=Math.max(...myTypes.map(t=>typeMult(t,DEX[cur.mon.sp].types)));
  if(threat<2) return null; // only bail from a genuinely bad matchup
  if(cur.mon.hp>cur.mon.stats.hp*.5&&R()<0.55) return null; // don't always bail early even when threatened
  let bestI=-1,bestThreat=threat;
  b.foeTeam.forEach((s,i)=>{ if(i===b.foeTi||s.mon.hp<=0)return;
    const t=Math.max(...myTypes.map(ty=>typeMult(ty,DEX[s.mon.sp].types)));
    if(t<bestThreat){bestThreat=t;bestI=i;} });
  return bestI>=0?bestI:null;
}
/* AI: pick action for foe. lvl of intelligence 1-3 */
function aiPick(foeSide,mySide,weather,ai){
  const mvs=foeSide.mon.moves.filter(m=>m.pp>0);
  if(!mvs.length) return {type:"struggle"};
  if(ai>=2&&foeSide.mon.hp<foeSide.mon.stats.hp*.3){
    const h=mvs.find(m=>MOVES[m.id].fx.heal); if(h&&R()<.6) return {type:"move",mv:h};
  }
  let best=null,bestScore=-1;
  mvs.forEach(m=>{
    const M0=MOVES[m.id]; let score;
    if(M0.cat==="T"){
      score=15;
      if(M0.fx.st&&!mySide.mon.status)score=ai>=2?38:22;
      if(M0.fx.heal)score=foeSide.mon.hp<foeSide.mon.stats.hp*.55?45:4;
      if(M0.fx.buff&&Object.keys(M0.fx.buff).filter(k=>k!=="self"&&k!=="onKO").every(k=>(foeSide.stg[k]||0)<2))score=ai>=2?30:18;
      if(M0.fx.deb)score=20;
      score*= (0.7+R()*0.6);
    } else {
      const {dmg,mult}=calcDamage(foeSide,mySide,M0,weather);
      score=Math.min(dmg,mySide.mon.hp)*(mult>=2?1.3:mult<=0.5?0.5:1)*(M0.acc/100);
      if(dmg>=mySide.mon.hp)score*=ai>=2?2.2:1.4;
      if(ai===1)score*=(0.6+R()*0.8);
    }
    if(score>bestScore){bestScore=score;best=m;}
  });
  return {type:"move",mv:best};
}
/* catch */
function catchRoll(mon,ballMult){
  const d=DEX[mon.sp];
  let bonus=1; if(mon.status==="DAZ")bonus=2; else if(mon.status)bonus=1.5;
  const a=((3*mon.stats.hp-2*mon.hp)*d.cr*ballMult*bonus)/(3*mon.stats.hp);
  const shakes=Math.min(3,Math.floor(a/85)+ (R()*255<a?3:ri(0,2)));
  return {caught:R()*255<a,shakes:Math.max(1,shakes)};
}
/* rival team scaling */
function rivalTeam(rid,chips){
  const base=RIVAL_BASE[rid], n=chips>=6?3:chips>=3?3:2, lvl=7+chips*4;
  const pools={simon:["ls1","ls11","ls111","parthree","birdie","moonrock"],
    kettle:["sweettooth","sweetmolar","soapbar","triplezero","castlekush","lpc"],
    oli:["wasabiseed","wasabi","wasabiprime","smallblind","bigblind","allinmon"]};
  const p=pools[rid], team=[];
  for(let i=0;i<n;i++){ const tier=chips>=6?2:chips>=3?1:0;
    team.push([p[Math.min(p.length-1,i*2+tier)],clamp(lvl+i*2-2,5,50)]); }
  return team;
}

function mastersTeam(rid){ const p={simon:[["ls111",44],["moonrock",43],["albatross",45]],

  oli:[["wasabiprime",44],["allinmon",43],["bangroyale",45]]}; return p[rid]; }

/* ---- save/load ---- */
const SAVEKEY="dealdex_v2";
let MEMSAVE=null;
function saveGame(G){ const s=JSON.stringify({v:2,G:{...G,battle:null,ui:null}});
  try{localStorage.setItem(SAVEKEY,s);}catch(e){MEMSAVE=s;} }
function loadGame(){ try{const s=localStorage.getItem(SAVEKEY)||MEMSAVE; if(!s)return null;
  const o=JSON.parse(s); if(!o||o.v!==2)return null;
  const G=o.G; /* migrate: fill any fields added in updates since this save was written */
  G.visited=G.visited||{[G.map]:true}; G.settings=G.settings||{sound:true,speed:1};
  G.stats=G.stats||{}; G.picked=G.picked||{}; G.achv=G.achv||{}; G.beaten=G.beaten||{};
  G.rematchAt=G.rematchAt||{}; G.rivalTier=G.rivalTier||{simon:-1,kettle:-1,oli:-1};
  G.checkpoint=G.checkpoint||null;
  return G;}catch(e){return null;} }
function hasSave(){ try{return !!(localStorage.getItem(SAVEKEY)||MEMSAVE);}catch(e){return !!MEMSAVE;} }
function clearSave(){ try{localStorage.removeItem(SAVEKEY);}catch(e){} MEMSAVE=null; }

function addItem(bag,id,n=1){ const b={...bag}; b[id]=(b[id]||0)+n; if(b[id]<=0)delete b[id]; return b; }

/* ---- quest bus: returns {G,msgs[]} ---- */
function questTick(G,type,payload){
  const msgs=[]; let g={...G,quests:{...G.quests},flags:{...G.flags},bag:{...G.bag}};
  const prog=(qid,done,rewardNow)=>{
    const q=QUESTS[qid]; if(!g.quests[qid]||g.quests[qid].done)return;
    if(done){ g.quests[qid]={...g.quests[qid],done:true};
      const r=q.reward||{};
      if(r.coins){g.coins+=r.coins;msgs.push("+"+r.coins+" coins");}
      if(r.items)Object.entries(r.items).forEach(([id,n])=>{g.bag=addItem(g.bag,id,n);msgs.push("Got "+ITEMS[id].name+"!");});
      if(r.flag)g.flags[r.flag]=true;
      msgs.push("Quest complete: "+q.name+"!"); sfx.chip();
    }
  };
  if(type==="defeatTrainer"){
    g.stats={...g.stats,tbeat:(g.stats.tbeat||0)+1};
    if(g.quests.seo&&!g.quests.seo.done){
      const c=(g.quests.seo.c||0)+1; g.quests.seo={...g.quests.seo,c};
      if(c<4)msgs.push("Field data: "+c+"/4 trainers logged.");
      prog("seo",c>=4);
    }
  }
  if(type==="item"){
    const id=payload;
    if(id==="lotto"&&g.quests.lotto&&!g.quests.lotto.done){
      const c=(g.bag.lotto||0); msgs.push("Tickets: "+c+"/4. 29 is key.");
    }
    if(id==="seveniron")prog("seveniron",true);
    if(id==="note"&&g.quests.reminders&&!g.quests.reminders.done){
      const c=(g.bag.note||0); msgs.push("Agenda items: "+c+"/7");
      if(c>=7){prog("reminders",true);g.achq=[...(g.achq||[]),"allnotes"];}
    }
  }
  return {g,msgs};
}
/* achievements check */
function checkAchv(G,push){
  const has=id=>G.achv[id];
  const caught=Object.values(G.dex).filter(d=>d.caught).length;
  const grant=id=>{ if(!G.achv[id]){G.achv={...G.achv,[id]:true};const a=ACHV.find(x=>x.id===id);push("🏅 "+a.name);sfx.lvl();} };
  if((G.stats.catches||0)>=1)grant("firstcatch"); if(caught>=10)grant("catch10"); if(caught>=30)grant("catch30"); if(caught>=60)grant("catch60");
  if(G.chips.length>=1)grant("chip1"); if(G.chips.length>=8)grant("chip8");
  if(G.coins>=2000)grant("rich");
  if(G.party.some(m=>m.lvl>=30))grant("lvl30"); if(G.party.some(m=>m.lvl>=50))grant("lvl50");
  if(G.flags.honest)grant("honest"); if(G.flags.quizdone)grant("quiz");
  if(G.flags.champion)grant("champion"); if(G.flags.golfunder)grant("golfwin"); if(G.flags.golf3under)grant("golf3");
  if(G.flags.streak5)grant("streak5");
  if((G.stats.wins||0)>=50)grant("battles50");
  ["eagle","jerusalem","andromeda","jacket"].forEach(k=>{if(G.flags["boss_"+k])grant(k);});
  if(G.flags.evolved)grant("evolve1");
  (G.achq||[]).forEach(grant); G.achq=[];
  return G;
}

const VW=15, VH=11, TS=Math.floor(462/VW); /* VH is the fallback; World computes live rows from screen height */
function useViewRows(){
  const [rows,setRows]=useState(VH);
  useEffect(()=>{
    function calc(){
      // In an itch.io iframe, window.innerHeight is the iframe height (often fixed small),
      // so also consider the physical device height (screen.height IS readable cross-origin).
      // Use whichever gives more usable room, minus fixed chrome (~340px).
      let vpH=window.innerHeight||600;
      try{ if(window.screen&&window.screen.height) vpH=Math.max(vpH, window.screen.height*0.82); }catch(e){}
      const avail=vpH-340;
      const r=clamp(Math.floor(avail/TS),9,21);
      setRows(r%2===0?r-1:r); // keep odd so the hero stays centred
    }
    calc();
    window.addEventListener("resize",calc);
    window.addEventListener("orientationchange",calc);
    return ()=>{window.removeEventListener("resize",calc);window.removeEventListener("orientationchange",calc);};
  },[]);
  return rows;
}

  function playToast(){const t=toastQ.current[0]; if(!t)return; setToast(t);
    setTimeout(()=>{toastQ.current.shift(); setToast(null); if(toastQ.current.length)setTimeout(playToast,120);},1500);}

    if(n.type==="block")return !g.beaten[n.id];

    if(n.type==="legend"){ if(g.flags["boss_"+(n.legend==="andromedamon"?"andromeda":n.legend==="greenjacket"?"jacket":n.legend)])return n.id==="volcspot";

  function move(dx,dy){
    const g=GRef.current; if(!g||g.screen!=="world"||busyRef.current||uiRef.current.any||bt.current)return;
    const dir=dx===1?"E":dx===-1?"W":dy===1?"S":"N";
    const nx=g.x+dx,ny=g.y+dy, M=MAPS[g.map];
    if(g.dir!==dir){setG(p=>({...p,dir}));}
    const n=npcAt(g.map,nx,ny);
    if(n){setG(p=>({...p,dir}));handleNpc(n);return;}
    /* warp? */
    const wp=M.warps.find(w=>w.x===nx&&w.y===ny);
    if(wp){
      if(wp.req){const need=parseInt(wp.req.replace("chips",""));
        if(wp.req.startsWith("chips")&&g.chips.length<need){openDialog("Blocked",[wp.reqMsg]);return;}}
      doWarp(wp);return;}
    const t=tileAt(g.map,nx,ny);
    if(SOLID.has(t)){setG(p=>({...p,dir}));return;}
    busyRef.current=true;
    setG(p=>{
      let g2={...p,x:nx,y:ny,dir,steps:p.steps+1,repel:Math.max(0,p.repel-1)};
      /* time */
      if(g2.steps%STEPS_PER_PHASE===0){ g2.phase=(g2.phase+1)%4;
        if(g2.phase===0){g2.day++;push("A new day. Swarm: "+DEX[swarmOf(g2.day)].name);}
        g2.weatherOw=rollWeather(g2.map,g2.phase);
        push(PHASES[g2.phase]+(g2.weatherOw!=="clear"?" — "+({mist:"sea mist",rain:"drizzle",heat:"heatwave"})[g2.weatherOw]:""));}
      /* pickups */
      const ck="c:"+g2.map+":"+nx+","+ny;
      if(t==="c"&&!g2.picked[ck]){g2.picked={...g2.picked,[ck]:1};g2.coins+=8;sfx.coin();push("+8 coins");}
      const hid=M.hidden.find(h=>h.x===nx&&h.y===ny), hk="h:"+g2.map+":"+nx+","+ny;
      if(hid&&!g2.picked[hk]){g2.picked={...g2.picked,[hk]:1};g2.bag=addItem(g2.bag,hid.item,hid.n);sfx.coin();
        push("Found "+(hid.n>1?hid.n+"x ":"")+ITEMS[hid.item].name+"!");}
      const nsp=NOTESPOTS.find(o=>o.map===g2.map&&o.x===nx&&o.y===ny), nk="n:"+g2.map+":"+nx+","+ny;
      if(nsp&&!g2.picked[nk]){g2.picked={...g2.picked,[nk]:1};g2.bag=addItem(g2.bag,"note",1);sfx.caught();
        push("📝 "+nsp.text); const r=questTick(g2,"item","note"); r.msgs.forEach(push); g2=r.g;}
      return checkAchv(g2,push);});
    setTimeout(()=>{busyRef.current=false;
      /* encounter after state applied */
      const g2=GRef.current, t2=tileAt(g2.map,g2.x,g2.y), M2=MAPS[g2.map];
      const table=M2.enc&&(g2.phase===3&&M2.enc.night?M2.enc.night:(M2.enc.grass||M2.enc.cave));
      const rate=t2==="G"?0.2:t2==="g"?0.12:(M2.dark&&t2===".")?0.09:0;
      if(table&&rate>0&&g2.repel<=0&&R()<rate){
        let sp; if(R()<0.12)sp=swarmOf(g2.day);
        else{const tot=table.reduce((a,[,w])=>a+w,0);let r=R()*tot;
          for(const [s,w] of table){r-=w;if(r<=0){sp=s;break;}} sp=sp||table[0][0];}
        const lvl=ri(M2.enc.lvl[0],M2.enc.lvl[1]);
        startBattle({kind:"wild",mon:mkMon(sp,lvl)});}
    },135);
  }

  function applyMyMon(){ // write battle mon back to party; returns the fresh array synchronously
    // (setG's own updater always sees fresh state, but GRef.current does NOT update until
    // the next render — callers that need the up-to-date party immediately must use this return value)
    const b=bt.current;

  async function grantXp(){
    const b=bt.current, g=GRef.current;
    const gain=xpGain(b.foe.mon,!!b.trainer);
    b.log.push(DEX[b.my.mon.sp].name+" gained "+gain+" XP.");rr();await sleep(500);
    let m=b.my.mon; m.xp+=gain;
    while(m.xp>=xpFor(m.lvl+1)&&m.lvl<60){
      m.lvl++; recalcStats(m); sfx.lvl();
      b.animMy="lvlflash"; b.log.push(DEX[m.sp].name+" grew to Lv."+m.lvl+"!"); rr();
      await sleep(600); b.animMy="";
      const news=LEARN[m.sp].filter(([l])=>l===m.lvl).map(([,mv])=>mv);
      for(const mv of news){ if(m.moves.some(x=>x.id===mv))continue;
        if(m.moves.length<4){m.moves.push({id:mv,pp:MOVES[mv].pp});b.log.push("Learned "+MOVES[mv].name+"!");}
        else{const old=m.moves.shift();m.moves.push({id:mv,pp:MOVES[mv].pp});
          b.log.push("Forgot "+MOVES[old.id].name+"... learned "+MOVES[mv].name+"!");}
        rr(); await sleep(500);}
    }
    applyMyMon();
    /* XP Share (real Pokemon rule): rest of the party — alive, not the active battler — gets a reduced share */
    const benchGain=Math.max(1,Math.round(gain*0.5));
    const leveled=[];
    const bench=GRef.current.party.map((pm,i)=>{
      if(i===b.myIdx||pm.hp<=0)return pm;
      const bm={...pm}; bm.xp+=benchGain;
      while(bm.xp>=xpFor(bm.lvl+1)&&bm.lvl<60){
        bm.lvl++; recalcStats(bm);
        const news2=LEARN[bm.sp].filter(([l])=>l===bm.lvl).map(([,mv])=>mv);
        news2.forEach(mv=>{ if(bm.moves.some(x=>x.id===mv))return;
          if(bm.moves.length<4)bm.moves.push({id:mv,pp:MOVES[mv].pp});
          else{bm.moves.shift();bm.moves.push({id:mv,pp:MOVES[mv].pp});} });
        leveled.push(DEX[bm.sp].name+" Lv."+bm.lvl);
      }
      return bm;
    });
    setG(p=>({...p,party:p.party.map((pm,i)=>i===b.myIdx?pm:bench[i])}));
    if(leveled.length){ b.log.push("Bench XP: "+leveled.join(", ")+"!"); rr(); await sleep(400); }
  }
  async function doMoveAct(att,def,slot,isMy){
    const b=bt.current, mv=MOVES[slot.id];
    const who=DEX[att.mon.sp].name;
    /* status gates */
    if(att.mon.status==="DAZ"){
      att.vol.daz=(att.vol.daz||ri(1,3))-1;
      if(att.vol.daz>0){b.log.push(who+" is fast asleep...");rr();await sleep(550);return;}
      att.mon.status=null;b.log.push(who+" woke up!");rr();await sleep(450);}
    if(att.mon.status==="CLK"&&R()<0.25){b.log.push(who+" is couch-locked and can't move!");rr();await sleep(550);return;}
    if(att.vol.flinch){att.vol.flinch=0;b.log.push(who+" flinched!");rr();await sleep(500);return;}
    slot.pp=Math.max(0,slot.pp-1);
    b.log.push(who+" used "+mv.name+"!");rr();await sleep(420);
    if(def.vol.prot&&mv.cat!=="T"){def.vol.prot=0;b.log.push("But "+DEX[def.mon.sp].name+" protected itself!");rr();await sleep(500);return;}
    if(!accCheck(att,def,mv)){b.log.push("It missed!");rr();await sleep(450);return;}
    if(mv.cat==="T"){
      const fx=mv.fx;
      if(fx.weather){b.weather=fx.weather==="clear"?"clear":fx.weather;
        b.log.push(fx.weather==="clear"?"The skies clear on command.":"The weather shifts!");}
      if(fx.heal){const h=Math.round(att.mon.stats.hp*fx.heal);att.mon.hp=clamp(att.mon.hp+h,0,att.mon.stats.hp);
        sfx.heal();b.log.push(who+" recovered "+h+" HP!");}
      if(fx.cureSelf&&att.mon.status){att.mon.status=null;b.log.push(who+" shook off its condition!");}
      if(fx.buff){Object.entries(fx.buff).forEach(([k,v])=>{if(k==="self"||k==="onKO")return;
        att.stg[k]=clamp(att.stg[k]+v,-6,6);});b.log.push(who+"'s stats rose!");}
      if(fx.deb){Object.entries(fx.deb).forEach(([k,v])=>{def.stg[k]=clamp(def.stg[k]+v,-6,6);});
        b.log.push(DEX[def.mon.sp].name+"'s stats fell!");}
      if(fx.st&&!def.mon.status&&R()*100<fx.st.ch){
        if(fx.st.self)att.mon.status=fx.st.id; else def.mon.status=fx.st.id;
        b.log.push(DEX[(fx.st.self?att:def).mon.sp].name+" is "+STATUS[fx.st.id].name.toLowerCase()+"!");}
      if(fx.prot){att.vol.prot=1;b.log.push(who+" braced itself!");}
      if(fx.leech){def.vol.leech=1;b.log.push(DEX[def.mon.sp].name+" was seeded by roots!");}
      rr();await sleep(550);return;}
    /* damaging */
    const hits=mv.fx.hits?ri(mv.fx.hits[0],mv.fx.hits[1]):1;
    let total=0,lastRes=null;
    for(let h=0;h<hits;h++){
      if(def.mon.hp<=0)break;
      const res=calcDamage(att,def,mv,b.weather);lastRes=res;
      /* endure item */
      const held=heldOf(def.mon);
      let dmg=res.dmg;
      if(held&&held.endure&&dmg>=def.mon.hp&&R()<held.endure){dmg=def.mon.hp-1;b.log.push(DEX[def.mon.sp].name+" gritted through with Focus Grit!");}
      def.mon.hp=clamp(def.mon.hp-dmg,0,def.mon.stats.hp);total+=dmg;
      if(isMy){b.animFoe="hitflash";}else{b.animMy="hitflash";}
      b.shake=(res.crit||res.mult>=2)?"shakeBig":"shake"; /* bigger shake on crit / super-effective */
      (res.crit?sfx.crit:sfx.hit)();
      rr();await sleep(300);b.animMy="";b.animFoe="";b.shake="";rr();
    }
    if(hits>1)b.log.push("Hit "+hits+" times!");
    if(lastRes){
      if(lastRes.crit)b.log.push("A critical hit!");
      if(lastRes.mult>=2)b.log.push("It's super effective!");
      else if(lastRes.mult>0&&lastRes.mult<1)b.log.push("Not very effective...");
    }
    if(mv.fx.drain&&total>0){const h=Math.max(1,Math.round(total*mv.fx.drain));
      att.mon.hp=clamp(att.mon.hp+h,0,att.mon.stats.hp);b.log.push(who+" drained "+h+" HP!");}
    if(mv.fx.recoil&&total>0){const rd=Math.max(1,Math.round(total*mv.fx.recoil));
      att.mon.hp=clamp(att.mon.hp-rd,0,att.mon.stats.hp);b.log.push(who+" was hurt by recoil!");}
    if(mv.fx.st&&!def.mon.status&&def.mon.hp>0&&R()*100<mv.fx.st.ch){
      def.mon.status=mv.fx.st.id;b.log.push(DEX[def.mon.sp].name+" is "+STATUS[mv.fx.st.id].name.toLowerCase()+"!");}
    if(mv.fx.deb&&def.mon.hp>0&&R()*100<(mv.fx.deb.ch||100)&&mv.fx.deb.ch!==undefined){
      Object.entries(mv.fx.deb).forEach(([k,v])=>{if(k==="ch")return;def.stg[k]=clamp(def.stg[k]+v,-6,6);});
      b.log.push(DEX[def.mon.sp].name+"'s stats fell!");}
    if(mv.fx.flinch&&R()*100<mv.fx.flinch)def.vol.flinch=1;
    if(mv.fx.buff&&mv.fx.buff.onKO&&def.mon.hp<=0){att.stg.atk=clamp(att.stg.atk+1,-6,6);b.log.push(who+" is fired up! #doyouwantit");}
    rr();await sleep(520);
  }
  async function endOfTurn(){
    const b=bt.current;
    for(const [side,other,isMy] of [[b.my,b.foe,true],[b.foe,b.my,false]]){
      const m=side.mon; if(m.hp<=0)continue;
      const nm=DEX[m.sp].name;
      if(m.status==="GRN"){const d=Math.max(1,Math.floor(m.stats.hp/8));m.hp=clamp(m.hp-d,0,m.stats.hp);
        b.log.push(nm+" is greening out! -"+d);rr();await sleep(400);}
      if(m.status==="MUN"){const d=Math.max(1,Math.floor(m.stats.hp/16));m.hp=clamp(m.hp-d,0,m.stats.hp);
        b.log.push(nm+" snacks on itself... -"+d);rr();await sleep(400);}
      if(side.vol.leech&&m.hp>0){const d=Math.max(1,Math.floor(m.stats.hp/8));m.hp=clamp(m.hp-d,0,m.stats.hp);
        other.mon.hp=clamp(other.mon.hp+d,0,other.mon.stats.hp);
        b.log.push("Roots drain "+nm+"!");rr();await sleep(400);}
      const held=heldOf(m);
      if(held&&held.regen&&m.hp>0&&m.hp<m.stats.hp){const h=Math.max(1,Math.floor(m.stats.hp*held.regen));
        m.hp=clamp(m.hp+h,0,m.stats.hp);b.log.push(nm+" nibbled its Leftover Munchies.");rr();await sleep(350);}
      if(held&&held.pinch&&!side.pinchUsed&&m.hp>0&&m.hp<m.stats.hp*0.3){side.pinchUsed=true;
        const h=Math.round(m.stats.hp*held.pinch);m.hp=clamp(m.hp+h,0,m.stats.hp);
        b.log.push(nm+"'s Bot Bot kicked in! +"+h);sfx.heal();rr();await sleep(400);}
    }
  }
  async function checkFaints(){
    const b=bt.current, g=GRef.current;
    /* self-faint is checked FIRST: a simultaneous recoil/self-KO must never be
       reported as a win just because the foe also fainted in the same action */
    if(b.my.mon.hp<=0){
      b.animMy="faintanim";sfx.faint();b.log.push(DEX[b.my.mon.sp].name+" fainted!");rr();await sleep(700);b.animMy="";
      const party=applyMyMon();
      const alive=party.findIndex(m=>m.hp>0);
      if(alive>=0){b.needSwitch=true;return "switch";}
      return "loss";}
    if(b.foe.mon.hp<=0){
      b.animFoe="faintanim";sfx.faint();b.log.push(DEX[b.foe.mon.sp].name+" fainted!");rr();await sleep(700);b.animFoe="";
      setG(p=>({...p,stats:{...p.stats,wins:(p.stats.wins||0)+1}}));
      await grantXp();
      if(b.trainer&&b.foeTeam){
        const nextI=b.foeTeam.findIndex((s,i)=>i!==b.foeTi&&s.mon.hp>0);
        if(nextI>=0){
          b.foeTi=nextI; b.foe=b.foeTeam[nextI];
          setG(p=>({...p,dex:{...p.dex,[b.foe.mon.sp]:{seen:true,caught:(p.dex[b.foe.mon.sp]||{}).caught||false}}}));
          b.log.push(b.trainer.name+" sends out "+DEX[b.foe.mon.sp].name+"!");rr();await sleep(600);
          return "next";}}
      return "win";}
    return null;
  }
  async function playerTurn(action){
    const b=bt.current; if(b.busy||b.over)return;
    b.busy=true;b.menu="none";rr();
    let myAct=action;
    /* foe decides: a switch (if warranted) always takes priority over a move, same as real Pokemon */
    const swi=aiPickSwitch(b,b.my);
    let foeAct;
    if(swi!=null){
      b.foeTi=swi; b.foe=b.foeTeam[swi];
      b.log.push((b.trainer?b.trainer.name:"The foe")+" switches to "+DEX[b.foe.mon.sp].name+"!");rr();await sleep(600);
      foeAct={type:"none"};
    } else {
      foeAct=aiPick(b.foe,b.my,b.weather,b.ai||(b.trainer&&b.trainer.ai)||1);
    }
    /* order */
    const order=[];
    if(myAct.type==="move"&&foeAct.type==="move"){
      const pm=MOVES[myAct.mv.id].pri,pf=MOVES[foeAct.mv.id].pri;
      const ms=effStat(b.my,"spe"),fs=effStat(b.foe,"spe");
      const meFirst=pm>pf||(pm===pf&&(ms>fs||(ms===fs&&R()<.5)));
      if(pm!==pf) b.log.push((meFirst?DEX[b.my.mon.sp].name:DEX[b.foe.mon.sp].name)+" moves first (priority)!");
      else b.log.push((meFirst?DEX[b.my.mon.sp].name:DEX[b.foe.mon.sp].name)+" is faster — moves first!");
      rr();await sleep(420);
      order.push(meFirst?["my",myAct]:["foe",foeAct],meFirst?["foe",foeAct]:["my",myAct]);
    } else { if(myAct.type!=="none")order.push(["my",myAct]); order.push(["foe",foeAct]); }
    for(const [who,act] of order){
      if(b.over)break;
      const att=who==="my"?b.my:b.foe, def=who==="my"?b.foe:b.my;
      if(att.mon.hp<=0)continue;
      if(act.type==="move")await doMoveAct(att,def,act.mv,who==="my");
      else if(act.type==="struggle"){b.log.push(DEX[att.mon.sp].name+" has no moves left! It flails!");
        const res=calcDamage(att,def,{cat:"P",pow:40,type:"Dust",fx:{},acc:100},b.weather);
        def.mon.hp=clamp(def.mon.hp-res.dmg,0,def.mon.stats.hp);
        att.mon.hp=clamp(att.mon.hp-Math.round(res.dmg*.25),0,att.mon.stats.hp);rr();await sleep(500);}
      const f=await checkFaints();
      if(f==="win"){b.busy=false;await winBattle();return;}
      if(f==="loss"){b.busy=false;await loseBattle();return;}
      if(f==="switch"){b.busy=false;rr();return;}
      if(f==="next")break;
    }
    if(!b.over){await endOfTurn();
      const f=await checkFaints();
      if(f==="win"){await winBattle();return;}
      if(f==="loss"){await loseBattle();return;}
      if(f==="switch"){b.busy=false;rr();return;}
      b.busy=false;b.menu="main";rr();}
  }
  async function winBattle(){
    const b=bt.current;
    if(b.trainer){
      let reward=b.trainer.reward;
      const g=GRef.current;
      if(g.party.some(m=>m.item==="clubcarditem"))reward=Math.floor(reward*1.5);
      b.log.push(b.trainer.name+": "+(b.trainer.lose||"Good game."));
      b.log.push("Won "+reward+" coins!");sfx.coin();rr();
      setG(p=>{let g2={...p,coins:p.coins+reward,beaten:{...p.beaten,[b.trainer.id]:true},
        rematchAt:{...p.rematchAt,[b.trainer.id]:p.steps+700}};
        if(b.trainer.chip&&!g2.chips.includes(b.trainer.chip)){g2.chips=[...g2.chips,b.trainer.chip];
          push("🪙 TPT CHIP "+b.trainer.chip+" acquired!");sfx.chip();}
        if(b.rivalId)g2.rivalTier={...g2.rivalTier,[b.rivalId]:g2.chips.length};
        if(b.masters)g2.mastersStage=(g2.mastersStage||0)+1;
        const r=questTick(g2,"defeatTrainer",b.trainer.id);r.msgs.forEach(push);
        return checkAchv(r.g,push);});
    } else if(b.kind==="legend"){
      setG(p=>checkAchv({...p,flags:{...p.flags,["boss_"+b.legendKey]:true}},push));
      b.log.push("The presence recedes, impressed.");
    } else if(b.kind==="champion"){
      b.log.push("THE VOLCANO powers down, satisfied.","You are the LBT MASTERS CHAMPION!");
      setG(p=>checkAchv({...p,flags:{...p.flags,champion:true}},push));
      b.champion=true;
    } else { const coins=ri(4,10)+b.foe.mon.lvl; b.log.push("Found "+coins+" coins in the grass!");
      setG(p=>({...p,coins:p.coins+coins}));
      if(R()<0.3){const mat=pick(["dustsample","papers","seaglass","flint"]);
        setG(p=>({...p,bag:addItem(p.bag,mat,1)}));b.log.push("Picked up 1 "+ITEMS[mat].name+".");}}
    rr();endBattle("win");
  }
  async function loseBattle(){
    const b=bt.current;
    b.log.push("You're out of options...","You scrambled back to the Annexe.");rr();
    endBattle("loss");
  }
  async function tryRun(){
    const b=bt.current; if(b.busy||b.trainer)return;
    b.busy=true;b.menu="none";rr();
    const ok=R()<clamp(0.5+ (effStat(b.my,"spe")-effStat(b.foe,"spe"))/200,0.25,0.95);
    b.log.push(ok?"Got away safely!":"Couldn't escape!");rr();await sleep(500);
    if(ok){endBattle("ran");return;}
    b.busy=false;
    await playerTurn({type:"none"});
  }
  async function throwTin(ballId){
    const b=bt.current, g=GRef.current;
    if(b.busy)return;
    if(b.trainer){b.log.push("Can't tin another trainer's strain! Etiquette.");rr();return;}
    if(b.kind==="champion"){b.log.push("The Volcano cannot be caught. It must be subdued.");rr();return;}
    b.busy=true;b.menu="none";
    setG(p=>({...p,bag:addItem(p.bag,ballId,-1)}));
    b.log.push("You lob a "+ITEMS[ballId].name+"...");b.tinAnim=true;rr();
    const roll=catchRoll(b.foe.mon,ITEMS[ballId].ball);
    for(let i=0;i<roll.shakes;i++){await sleep(600);sfx.catch1();b.log.push("· shake ·");rr();}
    await sleep(500);b.tinAnim=false;
    if(roll.caught){
      sfx.caught();b.log.push("Gotcha! "+DEX[b.foe.mon.sp].name+" was caught!");
      const mon=deep(b.foe.mon);mon.status=null;
      setG(p=>{let g2={...p,dex:{...p.dex,[mon.sp]:{seen:true,caught:true}},
        stats:{...p.stats,catches:(p.stats.catches||0)+1}};
        if(g2.party.length<6)g2.party=[...g2.party,mon];
        else{g2.box=[...g2.box,mon];b.log.push("Sent to The Stash at the Annexe.");}
        if(b.legendKey)g2.flags={...g2.flags,["boss_"+b.legendKey]:true};
        return checkAchv(g2,push);});
      rr();await sleep(600);endBattle("caught");
    } else { b.log.push("It broke free!");rr();await sleep(400);b.busy=false;await playerTurn({type:"none"}); }
  }
  async function useBattleBoost(id){
    const b=bt.current; if(b.busy)return;
    b.busy=true;b.menu="none";closeUi("bbag");
    setG(p=>({...p,bag:addItem(p.bag,id,-1)}));
    const buff=ITEMS[id].battleBuff;
    Object.entries(buff).forEach(([k,v])=>{b.my.stg[k]=clamp((b.my.stg[k]||0)+v,-6,6);});
    b.log.push(DEX[b.my.mon.sp].name+" used "+ITEMS[id].name+"! Stats rose!");sfx.coin();rr();await sleep(500);
    b.busy=false;
    await playerTurn({type:"none"});
  }
  async function useBattleItem(id){
    const b=bt.current; if(b.busy)return;
    const it=ITEMS[id];
    if(it.ball){closeUi("bbag");await throwTin(id);return;}
    if(it.battleBuff){await useBattleBoost(id);return;}
    b.busy=true;b.menu="none";closeUi("bbag");
    setG(p=>({...p,bag:addItem(p.bag,id,-1)}));
    const m=b.my.mon;
    if(it.heal){const h=Math.min(it.heal,m.stats.hp-m.hp);m.hp=clamp(m.hp+it.heal,0,m.stats.hp);
      sfx.heal();b.log.push(DEX[m.sp].name+" recovered "+h+" HP!");}
    if(it.cure){if(it.cure==="ALL"||m.status===it.cure){m.status=null;b.log.push(DEX[m.sp].name+" was cured!");}
      else b.log.push("It had no effect...");}
    applyMyMon();rr();await sleep(500);
    b.busy=false;
    await playerTurn({type:"none"});
  }
  async function switchMon(i,free){
    const b=bt.current, g=GRef.current;
    if(g.party[i].hp<=0||i===b.myIdx)return;
    applyMyMon();
    b.myIdx=i;b.my=freshSide(deep(GRef.current.party[i]));
    b.needSwitch=false;closeUi("bparty");
    b.log.push("Go, "+DEX[b.my.mon.sp].name+"!");rr();
    if(free){b.busy=false;b.menu="main";rr();return;}
    await sleep(450);
    b.busy=false;
    await playerTurn({type:"none"});
  }
  function battleDone(){
    const b=bt.current, g=GRef.current;

    bt.current=null;
    /* evolution check */
    const evos=[];
    GRef.current.party.forEach((m,i)=>{const d=DEX[m.sp];
      if(d.evo&&m.lvl>=d.evo.lvl)evos.push(i);});
    if(evos.length)setEvoQ(evos);
    if(b.result==="loss"){
      setG(p=>{const cp=p.checkpoint||{map:"annexe_int",x:4,y:3};
      let g2={...p,map:cp.map,x:cp.x,y:cp.y,coins:Math.floor(p.coins*.85),visited:{...p.visited,[cp.map]:true},
        party:p.party.map(m=>({...m,hp:m.stats.hp,status:null}))};saveGame(g2);return g2;});
      push("Patched up at the Annexe. Lost some coins on the way.");

    if(champ)setG(p=>({...p,screen:"victory"}));

      let g2={...p,party,flags:{...p.flags,evolved:true}};

  function healUseItem(id,monIdx){
    const it=ITEMS[id];
    setG(p=>{const party=p.party.map((m,i)=>{

      if(it.heal&&m2.hp>0)m2.hp=clamp(m2.hp+it.heal,0,m2.stats.hp);

      return m2;});
      sfx.heal();return {...p,party,bag:addItem(p.bag,id,-1)};});

function RegionMap({G,onClose}){
  const visited=G.visited||{};
  const known=new Set(Object.keys(visited));
  Object.values(MAPS).forEach(m=>{if(visited[m.id])(m.warps||[]).forEach(w=>{if(w.to)known.add(w.to);});});
  const edges=[]; const seenE=new Set();
  Object.values(MAPS).forEach(m=>{(m.warps||[]).forEach(w=>{
    if(!w.to||!MAPS[w.to])return; const k=[m.id,w.to].sort().join("|");
    if(seenE.has(k))return; seenE.add(k);
    if(known.has(m.id)&&known.has(w.to)&&MAP_POS[m.id]&&MAP_POS[w.to])edges.push([m.id,w.to]);});});
  const nodes=Object.values(MAPS).filter(m=>known.has(m.id)&&MAP_POS[m.id]);
  return <div className="overlay">
    <div className="silk" style={{fontSize:11,marginBottom:2}}>REGION MAP</div>
    <p style={{fontSize:13,color:"var(--inkDim)",margin:"0 0 4px"}}>Explored {Object.keys(visited).length} / {Object.keys(MAPS).length} · 📍 {MAPS[G.map].name}</p>

      <svg viewBox="-4 0 112 124" style={{width:"100%",background:"linear-gradient(160deg,#b9cf9e,#a3c18e)",borderRadius:10,border:"2px solid var(--ink)"}}>
        <path d="M 98 0 C 92 20 100 34 96 48 C 92 62 102 72 98 86 C 96 96 100 110 97 124 L 112 124 L 112 0 Z" fill="#7fb2c9" opacity="0.7"/>
        {edges.map(([a2,b2],i)=>{const p=MAP_POS[a2],q=MAP_POS[b2];
          return <line key={i} x1={p[0]} y1={p[1]} x2={q[0]} y2={q[1]} stroke="#5d5643" strokeWidth="0.8" strokeDasharray="1.6 1.2" opacity="0.75"/>;})}
        {nodes.map(m=>{const pos=MAP_POS[m.id], here=m.id===G.map, seen=!!visited[m.id];
          return <g key={m.id}>
            {here&&<circle cx={pos[0]} cy={pos[1]} r="5.2" fill="none" stroke="var(--gold)" strokeWidth="1.4"><animate attributeName="r" values="4.6;6;4.6" dur="1.6s" repeatCount="indefinite"/></circle>}
            <circle cx={pos[0]} cy={pos[1]} r={m.indoor?2.2:3.2} fill={seen?(m.indoor?"#8a6bd0":"#3f7d4f"):"#8b8674"} stroke="#1B2A4A" strokeWidth="0.7" opacity={seen?1:.55}/>
            <text x={pos[0]} y={pos[1]+(m.indoor?5.4:6.6)} textAnchor="middle" style={{fontSize:"3.1px",fontFamily:"monospace",fontWeight:700,fill:seen?"#1B2A4A":"#6d6a5c"}}>{seen?m.name.split(" — ")[0].slice(0,16):"???"}</text>
          </g>;})}
      </svg>
      <p style={{fontSize:12,color:"var(--inkDim)",marginTop:4}}>● outdoor · <span style={{color:"#8a6bd0"}}>●</span> indoor · grey = spotted, unexplored · gold ring = you</p>
    </div>
    <button className="btn press" style={{marginTop:6}} onClick={onClose}>Close</button>
  </div>;
}

function GolfBox({st,set,G,setG,push,onClose}){
  const raf=useRef(null),val=useRef(0),dirR=useRef(1);
  const [bar,setBar]=useState(0);
  useEffect(()=>{
    if(st.stage!=="power"&&st.stage!=="acc")return;
    const speed=st.stage==="power"?2.2:3.4;
    function tick(){val.current+=dirR.current*speed;
      if(val.current>=100){val.current=100;dirR.current=-1;}
      if(val.current<=0){val.current=0;dirR.current=1;}
      setBar(val.current);raf.current=requestAnimationFrame(tick);}
    raf.current=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf.current);
  },[st.stage]);
  function lock(){
    if(st.stage==="power"){set({...st,stage:"acc",power:val.current});val.current=0;dirR.current=1;}
    else if(st.stage==="acc"){
      const pErr=Math.abs((st.power||0)-80),aErr=Math.abs(val.current-50);
      const great=pErr<10&&aErr<12, good=pErr<22&&aErr<25;
      const strokes=great?2:good?3:4;
      sfx.hit();push(great?"Pured it! Birdie!":good?"Solid par.":"Chunked it. Bogey.");
      const shots=[...st.shots,strokes];
      if(st.hole>=3){
        const total=shots.reduce((a,b)=>a+b,0),par=9,diff=total-par;
        const pay=Math.max(0,(par-total)*45)+(total<=par?35:0);
        setG(p=>{let g2={...p,coins:p.coins+pay};
          if(diff<0)g2.flags={...g2.flags,golfunder:true};
          if(diff<=-3)g2.flags={...g2.flags,golf3under:true};
          return checkAchv(g2,push);});
        if(pay>0){sfx.coin();push("+"+pay+" coins!");}
        set({...st,stage:"done",shots,total,diff});
      } else set({...st,stage:"power",hole:st.hole+1,shots});
    }
  }
  if(st.stage==="intro")return <div className="fullov" style={{textAlign:"center",paddingTop:40}}>
    <b className="silk" style={{fontSize:11}}>STONELEES PAR 3 CHALLENGE</b>
    <p style={{fontSize:16,margin:"10px 0"}}>3 holes, par 9. 20 coins entry. Stop the power bar near the sweet spot (80), then nail accuracy (50). Go 3-under and the Jacket will notice you.</p>
    <Btn dis={G.coins<20} on={()=>{setG(p=>({...p,coins:p.coins-20}));set({...st,stage:"power"});}}>Tee up (20🪙)</Btn>
    <div><button className="btn press" style={{marginTop:10,maxWidth:220}} onClick={onClose}>Not today</button></div></div>;
  if(st.stage==="done")return <div className="fullov" style={{textAlign:"center",paddingTop:50}}>
    <div style={{fontSize:40}}>⛳</div>
    <p style={{fontSize:20}}>Round: {st.total} ({st.diff===0?"level par":st.diff>0?"+"+st.diff:st.diff})</p>
    <p style={{fontSize:15,color:"var(--inkDim)"}}>{st.diff<=-3?"THE JACKET STIRS AT THE MASTERS ARENA.":st.diff<0?"Under par! Lovely stuff.":"The honesty box of golf: try again."}</p>
    <button className="btn press" style={{marginTop:12,maxWidth:240}} onClick={onClose}>Clubhouse</button></div>;
  return <div className="fullov" style={{textAlign:"center",paddingTop:40}}>
    <b className="silk" style={{fontSize:11}}>HOLE {st.hole}/3 — {st.stage==="power"?"POWER":"ACCURACY"}</b>
    <div style={{margin:"20px auto",width:"85%",height:26,border:"3px solid var(--ink)",borderRadius:8,position:"relative",background:"rgba(255,255,255,.4)"}}>
      <div style={{position:"absolute",left:(st.stage==="power"?"72%":"42%"),width:(st.stage==="power"?"16%":"16%"),top:0,bottom:0,background:"rgba(55,181,126,.5)"}}/>
      <div style={{position:"absolute",left:bar+"%",top:-4,bottom:-4,width:5,background:"var(--stamp)",borderRadius:2,transform:"translateX(-50%)"}}/></div>
    <Btn on={lock} style={{fontSize:22,padding:"10px 30px"}}>SWING</Btn>
    <p style={{fontSize:13,color:"var(--inkDim)",marginTop:10}}>Shots so far: {st.shots.join(", ")||"—"}</p></div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){console.error("Deal Dex crashed:",err,info);}
  render(){
    if(this.state.err){
      return <div style={{padding:20,fontFamily:"monospace",fontSize:14,lineHeight:1.5,color:"var(--lcd)"}}>
        <b style={{color:"var(--amber)",fontSize:16}}>Something went wrong mid-game.</b>
        <p>Your save is safe — it's written to your browser each time you move or finish a battle.</p>
        <pre style={{whiteSpace:"pre-wrap",color:"#e58",fontSize:12,maxHeight:240,overflow:"auto",background:"rgba(0,0,0,.25)",padding:8,borderRadius:6}}>{String(this.state.err&&(this.state.err.stack||this.state.err.message||this.state.err))}</pre>
        <button className="btn press" style={{marginTop:10,maxWidth:220}} onClick={()=>location.reload()}>Reload &amp; Continue</button>
      </div>;
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
(function(){
  var _fitting=false;
  function fitShell(){
    var el=document.querySelector('.shell');
    if(!el||_fitting)return;
    _fitting=true;
    el.style.transform='none';
    el.style.marginBottom='0px';
    var rect=el.getBoundingClientRect();
    var availW=window.innerWidth, availH=window.innerHeight;
    var scale=Math.min(1,(availW-8)/rect.width,(availH-8)/rect.height);
    el.style.transformOrigin='top center';
    el.style.transform='scale('+scale+')';
    el.style.marginBottom=((scale-1)*rect.height)+'px';
    requestAnimationFrame(function(){_fitting=false;});
  }
  window.__fitShell=fitShell;
  window.addEventListener('resize',fitShell);
  window.addEventListener('orientationchange',function(){setTimeout(fitShell,120);});
  function watchShell(){
    var el=document.querySelector('.shell');
    if(!el){setTimeout(watchShell,120);return;}
    if(window.ResizeObserver){ new ResizeObserver(function(){fitShell();}).observe(el); }
    fitShell();
  }
  window.addEventListener('DOMContentLoaded',watchShell);
  setTimeout(watchShell,0); setTimeout(fitShell,150); setTimeout(fitShell,400); setTimeout(fitShell,900);
  function boot(){
    var root=document.getElementById('root');
    function fail(t,d){root.innerHTML='<div style="max-width:min(520px,90vw);margin:24px auto;padding:16px;background:#123329;color:#bcd6a6;border-radius:12px;font-family:monospace;font-size:14px;line-height:1.5"><b style="color:#e0a53c;font-size:16px">Deal Dex could not start</b><br><br>'+t+(d?'<pre style="white-space:pre-wrap;color:#e58;margin-top:12px;font-size:12px;max-height:300px;overflow:auto">'+String(d).replace(/</g,"&lt;")+'</pre>':'')+'</div>';}
    if(!window.React||!window.ReactDOM){return fail('The React library did not load. This game needs an internet connection the first time it runs. If you double-clicked the file, some browsers block CDN scripts over file:// \u2014 host it (e.g. drag the folder onto app.netlify.com/drop) or try another browser.');}
    if(!window.Babel){return fail('The Babel compiler did not load (needs internet on first load).');}
    var src=document.getElementById('gamesrc').textContent, out;
    try{ out=Babel.transform(src,{presets:['react']}).code; }
    catch(e){ return fail('There was a problem compiling the game:',(e&&e.message)||e); }
    try{ (0,eval)(out); }
    catch(e){ return fail('There was a problem starting the game:',(e&&(e.stack||e.message))||e); }
  }
  if(document.readyState!=='loading') setTimeout(boot,0);
  else window.addEventListener('DOMContentLoaded',boot);
})();
</script>
</body>
</html>
